<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNET Infotech | Products Catalog</title>
    <link rel="stylesheet" href="assets/css/products.css?v=1.0">
    <link rel="stylesheet" href="assets/css/styles.css?v=1.0"> <link rel="icon" href="assets/img/logo_thumb.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>

    <nav class="navbar glass-nav">
        <a href="/index.html">
            <div class="navbar-left">
                <img src="assets/img/logo_png.png" class="logo" alt="Logo">
                <span class="title">GNET-Infotech</span>
            </div>
        </a>
        <div class="navbar-right">
            <i class="fas fa-user glass-icon" id="accountButton"></i>
        </div>
    </nav>

    <div class="header-tools fade-in-up">
        <div class="search-bar">
            <input type="text" placeholder="Search devices..." class="search-input glass-input-sm">
        </div>
        <div class="buttons">
            <button class="sort-btn modern-btn-outline" onclick="toggleSortMenu()"><i class="fas fa-sort"></i> Sort</button>
            <button class="filter-btn modern-btn" onclick="toggleFilterMenu()"><i class="fas fa-filter"></i> Filter</button>
        </div>
    </div>

    <div id="sort-menu" class="sort-menu glass-modal">
        <div class="sort-menu-content">
            <h3>Sort By</h3>
            <ul>
                <li onclick="sortBy('price-asc')">Price (Low to High)</li>
                <li onclick="sortBy('price-desc')">Price (High to Low)</li>
                <li onclick="sortBy('newest')">Newest Arrivals</li>
                <li onclick="sortBy('rating')">Highest Rated</li>
            </ul>
        </div>
    </div>

    <div id="filter-menu" class="filter-menu">
        <div class="filter-menu-content glass-modal-lg">
            <div class="filter-left">
                <h3>Refine Results</h3>
                <div class="filter-section">
                    <h4>Brands</h4>
                    <label class="custom-checkbox"><input type="checkbox" id="brand-lenovo"> Lenovo</label>
                    <label class="custom-checkbox"><input type="checkbox" id="brand-hp"> HP</label>
                    <label class="custom-checkbox"><input type="checkbox" id="brand-dell"> Dell</label>
                </div>
                <div class="filter-section">
                    <h4>Category</h4>
                    <label class="custom-checkbox"><input type="checkbox" id="purpose-student"> Student</label>
                    <label class="custom-checkbox"><input type="checkbox" id="purpose-business"> Business</label>
                    <label class="custom-checkbox"><input type="checkbox" id="purpose-desktop"> Desktops</label>
                </div>
                <button class="apply-filter-btn modern-btn" onclick="applyFilters()">Apply Filters</button>
                <button class="apply-filter-btn modern-btn-outline" onclick="toggleFilterMenu()" style="margin-top: 10px;">Close</button>
            </div>
        </div>
    </div>

    <div id="productContainer" class="product-container fade-in-up"></div>

    <footer class="glass-footer">
        <div class="footer-container">
            <div class="footer-left">
                <img src="assets/img/logo_png_white.png" class="footer-logo">
                <span class="brand-name">GNET-Infotech</span>
            </div>
            <div class="footer-center">
                <ul class="social-icons">
                    <li><a href="https://www.facebook.com/people/Gnet-Infotech/pfbid0NiZ4XjRDWaWsUvDi245iCWNABd7bdej94C5MpGPovTC8KhaNAi4W75kWWUxCszVxl/" target="_blank" class="social-icon"><i class="fab fa-facebook"></i></a></li>
                    <li><a href="https://www.instagram.com/gnetinfotech" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a></li>
                </ul>
            </div>
            <div class="footer-right">
                <p>&copy; 2024 GNET-Infotech. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const filterMenu = document.querySelector(".filter-menu");
            if (filterMenu) filterMenu.style.display = "none";
        });
        function toggleFilterMenu() {
            const m = document.getElementById('filter-menu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }
        function toggleSortMenu() {
            const m = document.getElementById('sort-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }
    </script>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/all-products.js" type="module"></script>
</body>
</html>
