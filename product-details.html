<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNET Infotech: Product Specifications</title>
    <link rel="icon" href="assets/img/logo_thumb.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css?v=1.0">
    <link rel="stylesheet" href="assets/css/product-details.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <nav class="navbar glass-nav">
        <a href="/index.html">
            <div class="navbar-left">
                <img src="assets/img/logo.jpg" class="logo">
                <span class="title">GNET-Infotech</span>
            </div>
        </a>
        <div class="navbar-right">
            <i class="fas fa-user glass-icon" id="accountButton"></i>
        </div>
    </nav>

    <div id="productContainer" class="product-container-main glass-card-lg fade-in-up"></div>

    <div class="stats-container fade-in-up">
        <div class="stat-item glass-card">
            <div class="stat-icon"><i class="fas fa-undo"></i></div>
            <h3>7 Days</h3><span>Hassle-Free Return</span>
        </div>
        <div class="stat-item glass-card">
            <div class="stat-icon"><i class="fas fa-truck"></i></div>
            <h3>5 Days</h3><span>Express Delivery</span>
        </div>
        <div class="stat-item glass-card">
            <div class="stat-icon"><i class="fas fa-sync"></i></div>
            <h3>14 Days</h3><span>Replacement Auth</span>
        </div>
    </div>

    <script type="module" src="assets/js/product-details.js"></script>
