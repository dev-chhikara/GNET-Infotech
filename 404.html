<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>GNET Infotech | Page Not Found</title>
    <meta name="description" content="GNET Infotech - Page Not Found">
    <link rel="stylesheet" href="https://www.moviezoo.tech/notFound/bootstrap.min.css">
    <link rel="icon" href="https://gnetinfotech.com/assets/img/logo_thumb.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        #errorImage {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://gnetinfotech.com/assets/img/comingsoon.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(8px) brightness(0.8);
            z-index: 1;
            transform: scale(1.05);
        }
        .glass-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .glass-container h1 { font-size: 3rem; font-weight: 700; margin-bottom: 10px; color: #0b233d; }
        .glass-container p { font-size: 1.2rem; margin-bottom: 30px; color: #4b5563; }
        .back-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #0b233d, #2563eb);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            color: white;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="errorImage"></div>   
    <div class="glass-container">
        <h1>404</h1>
        <p>The page you're looking for is currently unavailable or coming soon.</p>
        <a href="/index.html" class="back-btn">Return Home</a>
    </div>

    <script>
        document.addEventListener('contextmenu', (event) => event.preventDefault());
        document.addEventListener('keydown', (event) => {
            if ((event.ctrlKey && event.shiftKey && event.key === 'I') || 
                (event.ctrlKey && event.shiftKey && event.key === 'J') || 
                (event.ctrlKey && event.key === 'U') ||                  
                (event.key === 'F12')) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
