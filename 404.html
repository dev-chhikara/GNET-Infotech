<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>GNET Infotech | Page Not Found</title>
    <link rel="icon" href="https://gnetinfotech.com/assets/img/logo_thumb.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: linear-gradient(-45deg, #ffffff, #f8fafc, #f1f5f9, #eef2f6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #0f172a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; flex-direction: column;
            font-family: 'Montserrat', sans-serif;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 60px; border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .glass-container h1 { font-size: 4rem; font-weight: 800; margin-bottom: 10px; color: #0b233d; }
        .glass-container p { font-size: 1.2rem; margin-bottom: 40px; color: #475569; }
        .back-btn {
            padding: 15px 35px;
            background: linear-gradient(135deg, #0b233d, #2563eb);
            color: white; text-decoration: none; border-radius: 50px;
            font-weight: 700; transition: all 0.3s ease; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(37, 99, 235, 0.5); }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>404</h1>
        <p>The page you're looking for is currently unavailable or coming soon.</p>
        <a href="/index.html" class="back-btn">Return to Catalog</a>
    </div>
</body>
</html>
