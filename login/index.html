<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNET Infotech | Account Access</title>
    <!-- Relative paths adjusted for being inside the /login/ folder -->
    <link rel="icon" href="../assets/img/logo_thumb.png" type="image/x-icon">
    
    <!-- Link to Master CSS for global UI (Nav, Buttons, Animations) -->
    <link rel="stylesheet" href="../assets/css/styles.css?v=6.0">
    <!-- Link to Local Login CSS for specific layout -->
    <link rel="stylesheet" href="styles.css?v=6.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="fullscreen-loader"><div class="loader-spinner"></div></div>
    
    <!-- Navigation -->
    <nav class="navbar glass-nav">
        <a href="../index.html">
            <div class="navbar-left">
                <img src="../assets/img/logo.jpg" class="logo" alt="GNET Logo">
                <span class="title">GNET Infotech</span>
            </div>
        </a>
        <div class="navbar-right" id="nav-menu">
            <button id="logout-btn" class="modern-btn-outline" style="display:none; padding: 8px 20px; font-size: 0.9rem;">Logout</button>
        </div>
    </nav>

    <div class="login-wrapper fade-in-up">
        <div class="login-glass-card">
            
            <!-- Left Side Image Cover -->
            <div class="login-image"></div>
            
            <!-- Right Side Form Content -->
            <div class="login-content">
                
                <!-- State 1: Login -->
                <div id="login-section">
                    <h2>Welcome Back</h2>
                    <p>Enter your registered mobile number to access your account.</p>
                    <input type="number" class="glass-input" id="mobile-input" maxlength="10" placeholder="Mobile Number (e.g. 9876543210)" />
                    
                    <div id="recaptcha-container" class="recaptcha-wrapper"></div>
                    
                    <button id="send-otp-btn" class="hero-btn full-width">Send OTP</button>
                    <button id="resend-otp-btn" class="modern-btn-outline full-width mt-10" style="display:none;">Resend OTP</button>
                    
                    <div id="otp-section" style="display:none;" class="mt-25">
                        <input type="number" class="glass-input" id="otp-input" maxlength="6" placeholder="Enter 6-Digit OTP" />
                        <button id="verify-otp-btn" class="hero-btn full-width mt-10">Verify Secure Login</button>
                    </div>
                    
                    <div id="timer-section" style="display:none;" class="timer-text">Please wait: <span id="timer"></span></div>
                    <div id="loading-spinner" style="display:none;" class="loading-text"><i class="fas fa-circle-notch fa-spin"></i> Authenticating...</div>
                </div>

                <!-- State 2: User Dashboard -->
                <div id="user-section" style="display:none;">
                    <div class="user-info">
                        <img src="https://cdn-icons-png.flaticon.com/512/147/147144.png" alt="User Avatar" class="user-avatar" />
                        <h2 id="user-name">User Name</h2>
                        <p class="contact-info"><i class="fas fa-phone"></i> <span id="user-mobile"></span></p>
                        <p class="contact-info"><i class="fas fa-envelope"></i> <span id="user-email"></span></p>
                        <button id="edit-profile-btn" class="modern-btn-outline mt-20">Edit Profile</button>
                    </div>

                    <h3 class="section-heading">Recent Orders</h3>
                    <div id="orders-list" class="horizontal-scroll">No recent orders</div>

                    <h3 class="section-heading">Your Cart</h3>
                    <div id="cart-list" class="horizontal-scroll">No items in the cart</div>
                </div>

            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 class="modal-heading">Edit Profile</h3>
            <input type="text" class="glass-input" id="edit-name" placeholder="Full Name"/>
            <input type="email" class="glass-input" id="edit-email" placeholder="Email Address"/>
            <button id="save-profile-btn" class="hero-btn full-width mt-20">Save Changes</button>
            <button id="cancel-edit-btn" class="modern-btn-outline full-width mt-10">Cancel</button>
        </div>
    </div>

    <script>
        document.getElementById('edit-profile-modal').style.display = 'none'; 
        window.addEventListener('load', () => {
            const loader = document.getElementById('fullscreen-loader');
            if (loader) loader.classList.add('hidden');
        });
    </script>
    <script src="script.js" type="module"></script>
</body>
</html>
